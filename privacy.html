<script>
const CONTENT = {
  tr: {
    title: "Gizlilik Politikası",
    updated: "Son güncelleme: Temmuz 2026",
    back: "← Ana sayfaya dön",
    html: `
      <h2>Genel Bakış</h2>
      <p>pdfcevir, resimleri PDF'e çeviren, PDF sıkıştıran ve PDF'den Word'e metin çıkaran ücretsiz bir araç setidir. Bu sayfa, siteyi kullanırken hangi verilerin nasıl işlendiğini açıklar.</p>

      <h2>Dosyalarınız</h2>
      <p>pdfcevir'e yüklediğiniz hiçbir dosya (resim, PDF) sunucularımıza gönderilmez veya saklanmaz. Tüm dönüştürme, sıkıştırma ve metin çıkarma işlemleri tamamen kendi tarayıcınızda, cihazınızda gerçekleşir. Dosyalarınız sayfayı kapattığınızda cihazınızın hafızasından silinir.</p>

      <h2>Çerezler ve Analitik</h2>
      <p>Siteyi geliştirmek amacıyla Google Analytics kullanıyoruz. Bu, hangi sayfaların ziyaret edildiği, hangi ülkeden erişildiği gibi anonim, toplu istatistikler toplar. Google Analytics bu amaçla çerezler kullanabilir. Bu verilerle sizi kişisel olarak tanımlamayız.</p>

      <h2>Reklamlar</h2>
      <p>İleride, siteyi ücretsiz tutabilmek için Google AdSense gibi reklam hizmetleri kullanabiliriz. Bu hizmetler etkinleştirildiğinde, reklam sağlayıcılar ilgi alanlarınıza göre reklam gösterebilmek için çerez kullanabilir. Google'ın reklam çerezleri hakkında daha fazla bilgiyi <a href="https://policies.google.com/technologies/ads" target="_blank" rel="noopener">Google'ın reklam politikaları sayfasında</a> bulabilirsiniz.</p>

      <h2>Üçüncü Taraf Hizmetler</h2>
      <p>Site, bazı açık kaynaklı kütüphaneleri (pdf-lib, pdf.js, JSZip) harici bir CDN (cdnjs.cloudflare.com) üzerinden yükler. Bu kütüphaneler tarayıcınızda çalışır ve dosyalarınızla ilgili hiçbir veri bu sunuculara gönderilmez.</p>

      <h2>Veri Güvenliği</h2>
      <p>Dosyalarınız hiçbir zaman bir sunucuya ulaşmadığı için, bu konuda bir veri sızıntısı riski bulunmamaktadır. Site HTTPS üzerinden sunulur.</p>

      <h2>İletişim</h2>
      <p>Bu politika hakkında sorularınız varsa, sitedeki iletişim kanallarından bize ulaşabilirsiniz.</p>
    `
  },
  en: {
    title: "Privacy Policy",
    updated: "Last updated: July 2026",
    back: "← Back to home",
    html: `
      <h2>Overview</h2>
      <p>pdfcevir is a free toolkit for converting images to PDF, compressing PDFs, and extracting text from PDF to Word. This page explains what data is processed when you use the site, and how.</p>

      <h2>Your Files</h2>
      <p>No file you upload to pdfcevir (image or PDF) is ever sent to or stored on our servers. All conversion, compression, and text extraction happens entirely in your own browser, on your device. Your files are cleared from your device's memory when you close the page.</p>

      <h2>Cookies & Analytics</h2>
      <p>We use Google Analytics to help improve the site. This collects anonymous, aggregated statistics such as which pages are visited and from which country. Google Analytics may use cookies for this purpose. We do not use this data to personally identify you.</p>

      <h2>Advertising</h2>
      <p>In the future, we may use advertising services such as Google AdSense to help keep the site free. When enabled, ad providers may use cookies to show ads based on your interests. You can learn more about Google's advertising cookies on <a href="https://policies.google.com/technologies/ads" target="_blank" rel="noopener">Google's ad policy page</a>.</p>

      <h2>Third-Party Services</h2>
      <p>The site loads a few open-source libraries (pdf-lib, pdf.js, JSZip) from an external CDN (cdnjs.cloudflare.com). These libraries run in your browser, and none of your file data is ever sent to these servers.</p>

      <h2>Data Security</h2>
      <p>Since your files never reach a server, there is no risk of a data breach related to them. The site is served over HTTPS.</p>

      <h2>Contact</h2>
      <p>If you have questions about this policy, you can reach us through the contact channels listed on the site.</p>
    `
  }
};

function applyLang(lang){
  const c = CONTENT[lang];
  document.documentElement.lang = lang;
  document.getElementById('title').textContent = c.title;
  document.getElementById('updated').textContent = c.updated;
  document.getElementById('content').innerHTML = c.html;
  document.getElementById('backLink').textContent = c.back;
  document.querySelectorAll('#langToggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}

const initialLang = (navigator.language || 'tr').toLowerCase().startsWith('tr') ? 'tr' : 'en';
applyLang(initialLang);

document.getElementById('langToggle').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  applyLang(btn.dataset.lang);
});
</script>
